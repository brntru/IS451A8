kind = "web"
previewPath = "/"
title = "StudyPoint"
version = "1.0.0"
id = "artifacts/studypoint"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19166

[services.development]
run = "pnpm --filter @workspace/studypoint run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/studypoint", "run", "build" ]
publicDir = "artifacts/studypoint/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19166"
BASE_PATH = "/"
